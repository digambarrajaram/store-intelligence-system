# Production docker-compose — Multi-store, multi-camera CCTV analytics platform
# Processes 8 concurrent CCTV feeds (CAM 1.mp4 → CAM 8.mp4) across 2 stores
# Aggregates store-level analytics with per-camera drill-down
#
# SETUP:
#   cp .env.example .env
#   mkdir -p videos
#   cp /path/to/CAM\ 1.mp4 videos/
#   ...
#   cp /path/to/CAM\ 8.mp4 videos/
#   mkdir -p grafana/provisioning
#   docker compose up -d

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    hostname: zookeeper
    container_name: zookeeper
    restart: unless-stopped
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost', 2181)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - store-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9093:9093"
    healthcheck:
      test: ["CMD", "python", "-c", "from kafka.admin import KafkaAdminClient; c=KafkaAdminClient(bootstrap_servers='localhost:9092', client_id='hc'); c.list_topics(); c.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - store-net

  redis:
    image: redis:7-alpine
    hostname: redis
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    sysctls:
      - vm.overcommit_memory=1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - store-net

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: digya285/store-intelligence-api:latest
    hostname: api
    container_name: api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - store-net

  # Store 1 workers (4 cameras)
  worker_store1_cam1:
    build:
      context: .
      dockerfile: Dockerfile
    image: digya285/store-intelligence-worker:latest
    hostname: worker_store1_cam1
    container_name: worker_store1_cam1
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./videos:/app/videos
      - ./config:/app/config:ro
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - CAMERA_CONFIG_PATH=/app/config/cameras.json
      - CAMERA_ID=camera_1
      - STORE_ID=store_1
      - MIN_CONFIDENCE=0.4
      - FRAME_SKIP=3
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r=redis.Redis(host='redis',port=6379, decode_responses=True); val=r.get('store:store_1:camera:camera_1:worker.alive'); exit(0 if val == '1' else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - store-net

  worker_store1_cam2:
    build:
      context: .
      dockerfile: Dockerfile
    image: digya285/store-intelligence-worker:latest
