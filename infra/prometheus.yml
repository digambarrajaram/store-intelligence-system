global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'cv-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'cv-worker'
    static_configs:
      - targets: ['worker:8000']  # Assuming worker might expose metrics too
    metrics_path: '/metrics'
    scrape_interval: 5s